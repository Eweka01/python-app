name: cicd

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::6}" >> "$GITHUB_ENV"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: eweka/python-app:${{ env.SHORT_SHA }}

  cd:
    needs: ci
    runs-on: self-hosted

    steps:
      - name: install argocd
        shell: bash
        run: |
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ] || [ "$ARCH" = "arm64" ]; then
            FILE=argocd-linux-arm64
          else
            FILE=argocd-linux-amd64
          fi

          rm -f argocd
          sudo rm -f /usr/local/bin/argocd

          curl -fSL -o argocd "https://argocd.test.com/download/argocd-linux-amd64"
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd

          /usr/local/bin/argocd version --client

      - name: ArgoCD app sync
        shell: bash
        run: |
          argocd login argocd-server.argocd \
            --insecure \
            --grpc-web \
            --username admin \
            --password "${{ secrets.ARGOCD_PASSWORD }}"
          argocd app sync python-app